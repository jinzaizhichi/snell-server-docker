version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "01:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "01:15"
      timezone: Asia/Shanghai
    labels:
      - dependencies
    commit-message:
      prefix: build
