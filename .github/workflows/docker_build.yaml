name: Publish Docker image
run-name: ${{ format('Snell Server Docker {0}', github.ref_name) }}
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: jiajunfeng/snell
  VCS_URL: https://github.com/jinzaizhichi/snell-server-docker

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set build metadata
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "VCS_REF=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Resolve and validate Snell version
        run: |
          echo "SNELL_VERSION=$(sh .github/scripts/check-release-version.sh)" >> "$GITHUB_ENV"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker tags
        run: |
          tag_commit="$(git rev-parse HEAD)"
          default_branch="${{ github.event.repository.default_branch }}"
          default_head="$(git ls-remote origin "refs/heads/${default_branch}" | awk '{print $1}')"

          if [ -z "${default_head}" ]; then
            echo "Failed to resolve HEAD for ${default_branch}" >&2
            exit 1
          fi

          {
            echo "DOCKER_TAGS<<EOF"
            echo "${IMAGE_REPOSITORY}:${GITHUB_REF_NAME}"
            if [ "${tag_commit}" = "${default_head}" ]; then
              echo "${IMAGE_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          build-args: |
            SNELL_VERSION=${{ env.SNELL_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
            VCS_URL=${{ env.VCS_URL }}
          platforms: |
            linux/amd64
            linux/arm64
